# 1) Install: https://fly.io/docs/hands-on/install-flyctl/
# 2) fly auth login
# 3) Change `app` to a unique name (or run `fly launch` and merge).
# 4) fly deploy
# 5) fly ips allocate-v4  → point domain A record to that IP
# 6) fly certs create ayushkashyap.me
#
# Curl: curl -sS https://ayushkashyap.me/terminal  (PowerShell: curl.exe)

app = "ayush-terminal"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
